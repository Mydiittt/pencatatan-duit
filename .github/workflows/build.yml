name: Build Windows Executable

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Recreate virtual environment and install PyInstaller
        run: |
          uv venv
          uv pip install pyinstaller

      - name: Build Executable
        run: |
          .venv\Scripts\pyinstaller --onefile --windowed --clean --name "MoneyWise" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoneyWise-Windows-Exe
          path: dist/MoneyWise.exe
